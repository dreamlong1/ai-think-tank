services:
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_API_BASE: ${OPENAI_API_BASE:-https://api.openai.com/v1}
      MODEL_NAME: ${MODEL_NAME:-gpt-4o-mini}
      CODEX_CLI_PATH: ${CODEX_CLI_PATH:-codex.cmd}
      CODEX_MODEL_NAME: ${CODEX_MODEL_NAME:-}
      MODEL_TIMEOUT_SECONDS: ${MODEL_TIMEOUT_SECONDS:-90}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/history"]
      interval: 10s
      timeout: 5s
      retries: 12

  frontend:
    build:
      context: ./frontend
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "8000:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
